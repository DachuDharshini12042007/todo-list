<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional To-Do List</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .todo-container {
        background: #0f3057;
        width: 350px;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        color: #fff;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .header h2 {
        margin: 0;
    }

    .input-box {
        display: flex;
        margin-bottom: 15px;
    }

    .input-box input {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    .input-box button {
        margin-left: 8px;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #00b4d8;
        color: white;
        font-size: 18px;
        cursor: pointer;
    }

    ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    li {
        background: #1b3b6f;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    li.completed span {
        text-decoration: line-through;
        opacity: 0.6;
    }

    li span {
        flex: 1;
        margin-left: 10px;
    }

    li button {
        background: transparent;
        border: none;
        color: #ff6b6b;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="todo-container">
    <div class="header">
        <h2>✔ To-Do List</h2>
    </div>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter new task">
        <button onclick="addTask()">+</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    const input = document.getElementById("taskInput");
    const taskText = input.value.trim();
    if (taskText === "") return;

    const li = document.createElement("li");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.onclick = () => li.classList.toggle("completed");

    const span = document.createElement("span");
    span.innerText = taskText;

    const delBtn = document.createElement("button");
    delBtn.innerHTML = "✖";
    delBtn.onclick = () => li.remove();

    li.appendChild(checkbox);
    li.appendChild(span);
    li.appendChild(delBtn);

    document.getElementById("taskList").appendChild(li);
    input.value = "";
}
</script>

</body>
</html>
